name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      DBT_DATABRICKS_TOKEN: ${{ secrets.DBT_DATABRICKS_TOKEN }}

    defaults:
      run:
        working-directory: libera_dbt

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-databricks

      - name: Install dbt packages
        run: dbt deps

      - name: Check dbt connection
        run: dbt debug --profiles-dir . --target ci

      - name: Deploy and Test Models (CI)
        run: dbt build --profiles-dir . --target ci