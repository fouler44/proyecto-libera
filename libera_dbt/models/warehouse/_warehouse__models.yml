version: 2

models:
  - name: dim_unidades
    description: "Dimensión de unidades vendidas u observadas en la vista de ventas. Grano: una fila por desarrollo y unidad."

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - desarrollo_largo
              - unidad

    columns:
      - name: unidad_key
        data_tests:
          - not_null
          - unique

  - name: fct_ventas
    description: "Tabla de hechos de ventas, con una fila por id_venta."

    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "fecha_ultimo_pago_enganche >= fecha_primer_enganche"

    columns:
      - name: venta_key
        data_tests:
          - unique
          - not_null

      - name: id_venta
        data_tests:
          - unique
          - not_null

      - name: unidad_key
        data_tests:
          - not_null

  - name: fct_pagos_vencidos
    description: >
      Fact table con el detalle de pagos vencidos. El grano es una fila por
      pago vencido de una venta, definido por id_venta, no_pago, fecha_pago
      y tipo_pago.

    columns:
      - name: pago_vencido_key
        description: Llave surrogate del pago vencido.
        tests:
          - unique
          - not_null

      - name: id_venta
        description: Identificador operativo de la venta asociada al pago vencido.

      - name: venta_key
        description: Llave surrogate de la venta. No se fuerza relación obligatoria contra fct_ventas en esta fase.

      - name: unidad_key
        description: Llave surrogate de la unidad asociada al pago vencido.

      - name: no_pago
        description: Número de pago vencido.
        tests:
          - not_null

      - name: fecha_pago
        description: Fecha programada del pago vencido.
        tests:
          - not_null

      - name: monto_vencido
        description: Monto vencido del pago.
        tests:
          - not_null

      - name: dias_atraso
        description: Días de atraso del pago vencido.
        tests:
          - not_null

      - name: tipo_pago
        description: Tipo de pago vencido.

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
            - id_venta
            - no_pago
            - fecha_pago
            - tipo_pago

  - name: fct_cronograma_unidades
    description: >
      Fact tipo snapshot acumulado que representa el avance operativo de una
      unidad por los hitos del cronograma. El grano es una fila por
      desarrollo_largo + unidad.

    columns:
      - name: cronograma_unidad_key
        description: Llave surrogate del cronograma de la unidad.
        tests:
          - unique
          - not_null

      - name: unidad_key
        description: Llave surrogate de la unidad asociada al cronograma.
        tests:
          - not_null

      - name: desarrollo_largo
        description: Desarrollo largo normalizado para alinearse con dim_unidades.
        tests:
          - not_null

      - name: unidad
        description: Identificador operativo de la unidad.
        tests:
          - not_null

      - name: estatus_cronograma_actual
        description: Estatus derivado a partir del último hito disponible.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
            - desarrollo_largo
            - unidad

  - name: dim_personas
    description: "Dimensión de personas deduplicadas entre clientes y copropietarios."

    columns:
      - name: persona_key
        data_tests:
          - unique
          - not_null

      - name: persona_natural_key
        data_tests:
          - unique
          - not_null

  - name: bridge_venta_persona
    description: "Tabla puente entre ventas y personas."

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - venta_key
              - persona_key
              - rol_persona_en_venta

    columns:
      - name: venta_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_ventas')
                field: venta_key

      - name: persona_key
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_personas')
                field: persona_key

  - name: fct_ingresos
    description: "Tabla de hechos de ingresos, con una fila por movimiento de ingreso."

    columns:
      - name: ingreso_key
        data_tests:
          - unique
          - not_null

      - name: monto_pagado
        data_tests:
          - not_null

  - name: fct_facturas
    description: "Tabla de hechos de facturación, con una fila por factura."

    columns:
      - name: factura_key
        data_tests:
          - unique
          - not_null

      - name: total_factura
        data_tests:
          - not_null

      - name: uuid
        data_tests:
          - unique
          - not_null

  - name: dim_date
    description: "Dimensión de fechas con una fila por día."

    columns:
      - name: date_day
        data_tests:
          - unique
          - not_null
